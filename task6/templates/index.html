<!DOCTYPE html>
<html>
<head>

<title>AI-Based Fake News Detection</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
}

.container{
    width:800px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

textarea{
    width:100%;
    height:250px;
    font-size:16px;
    padding:10px;
}

button{
    margin-top:20px;
    padding:12px 30px;
    background:green;
    color:white;
    border:none;
    font-size:18px;
    cursor:pointer;
}

.result{
    margin-top:25px;
    font-size:28px;
    color:blue;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>AI-Based Fake News Detection</h1>

<form method="POST">

<textarea
name="news"
placeholder="Paste the news article here..."
required></textarea>

<br>

<button type="submit">

Predict News

</button>

</form>

{% if prediction %}

<div class="result">

{{ prediction }}

</div>

{% endif %}

</div>

</body>

</html>
