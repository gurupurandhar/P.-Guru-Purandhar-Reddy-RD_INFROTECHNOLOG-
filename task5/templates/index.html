<!DOCTYPE html>
<html>
<head>
    <title>Face Mask Detection</title>
</head>
<body>

<h1>Face Mask Detection System</h1>

<form method="POST" enctype="multipart/form-data">

    <input type="file" name="image" required>

    <br><br>

    <input type="submit" value="Predict">

</form>

{% if prediction %}
<h2>{{ prediction }}</h2>
{% endif %}

</body>
</html>
