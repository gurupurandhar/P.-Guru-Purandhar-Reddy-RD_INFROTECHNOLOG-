<!DOCTYPE html>
<html>
<head>
    <title>AI-Based Sentiment Analysis</title>

    <style>

        body{
            background:#f4f4f4;
            font-family:Arial;
        }

        .container{

            width:700px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        textarea{

            width:100%;
            height:180px;
            font-size:18px;
        }

        button{

            margin-top:20px;
            padding:12px 30px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
            font-size:18px;
        }

        h1{

            text-align:center;
        }

        h2{

            color:green;
            text-align:center;
        }

    </style>

</head>

<body>

<div class="container">

<h1>AI-Based Sentiment Analysis</h1>

<form method="POST">

<textarea
name="text"
placeholder="Enter your social media post..."
required></textarea>

<br>

<button type="submit">

Analyze Sentiment

</button>

</form>

{% if prediction %}

<h2>

Prediction :
{{ prediction }}

</h2>

{% endif %}

</div>

</body>

</html>
