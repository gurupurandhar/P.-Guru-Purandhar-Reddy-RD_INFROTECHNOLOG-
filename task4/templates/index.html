<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI-Based Sentiment Analysis</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#0b1120;
            font-family:Arial, Helvetica, sans-serif;
            color:white;
        }

        .container{

            width:60%;
            margin:40px auto;
            background:#1e293b;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.5);

        }

        h1{

            text-align:center;
            color:#38bdf8;

        }

        p{

            text-align:center;
            font-size:18px;

        }

        textarea{

            width:100%;
            height:180px;
            padding:15px;
            font-size:18px;
            border-radius:10px;
            border:none;
            outline:none;
            resize:none;

        }

        button{

            width:100%;
            padding:15px;
            margin-top:20px;
            font-size:20px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            cursor:pointer;

        }

        button:hover{

            background:#1d4ed8;

        }

        .result{

            margin-top:30px;
            padding:20px;
            text-align:center;
            font-size:24px;
            border-radius:10px;
            background:#0f766e;

        }

        .positive{

            background:#16a34a;

        }

        .negative{

            background:#dc2626;

        }

        .neutral{

            background:#ca8a04;

        }

    </style>

</head>

<body>

<div class="container">

<h1>AI-Based Sentiment Analysis</h1>

<p>Analyze Social Media Posts using Machine Learning</p>

<form action="/predict" method="POST">

<textarea
name="text"
placeholder="Enter your social media text here..."
required></textarea>

<button type="submit">

Analyze Sentiment

</button>

</form>

{% if prediction %}

<div class="result {{ prediction_class }}">

<h2>{{ prediction }}</h2>

</div>

{% endif %}

</div>

</body>
</html>
