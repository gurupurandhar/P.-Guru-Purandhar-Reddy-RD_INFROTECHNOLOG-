<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Based Sentiment Analysis</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        .container{
            width:700px;
            margin:50px auto;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        textarea{
            width:100%;
            height:180px;
            padding:15px;
            font-size:18px;
            border:1px solid #ccc;
            border-radius:8px;
            resize:none;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:12px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:6px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:25px;
            padding:15px;
            background:#e8f5e9;
            border-radius:8px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
            color:#2e7d32;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>AI-Based Sentiment Analysis</h1>

    <form method="POST">

        <textarea
            name="text"
            placeholder="Enter your review or sentence..."
            required></textarea>

        <button type="submit">
            Analyze Sentiment
        </button>

    </form>

    {% if prediction %}

    <div class="result">
        Prediction: {{ prediction }}
    </div>

    {% endif %}

</div>

</body>
</html>
