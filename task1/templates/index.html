<!DOCTYPE html>
<html>
<head>

<title>AI Customer Support Chatbot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#4facfe,#00f2fe);

}

.container{

width:500px;

background:white;

border-radius:15px;

box-shadow:0px 10px 30px rgba(0,0,0,.3);

overflow:hidden;

}

.header{

background:#0077ff;

color:white;

padding:15px;

text-align:center;

font-size:24px;

font-weight:bold;

}

#chat{

height:400px;

padding:15px;

overflow-y:auto;

background:#f7f7f7;

}

.user{

text-align:right;

margin:10px;

}

.user span{

background:#0077ff;

color:white;

padding:10px 15px;

border-radius:20px;

display:inline-block;

}

.bot{

text-align:left;

margin:10px;

}

.bot span{

background:#e4e6eb;

padding:10px 15px;

border-radius:20px;

display:inline-block;

}

.footer{

display:flex;

padding:10px;

background:white;

}

input{

flex:1;

padding:12px;

border:1px solid #ccc;

border-radius:20px;

outline:none;

}

button{

margin-left:10px;

padding:12px 20px;

background:#0077ff;

border:none;

color:white;

border-radius:20px;

cursor:pointer;

}

button:hover{

background:#0056cc;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

🤖 AI Customer Support Chatbot

</div>

<div id="chat"></div>

<div class="footer">

<input
type="text"
id="message"
placeholder="Ask me anything...">

<button onclick="sendMessage()">

Send

</button>

</div>

</div>

<script>

function sendMessage(){

let msg=document.getElementById("message").value;

if(msg=="") return;

document.getElementById("chat").innerHTML+=

"<div class='user'><span>"+msg+"</span></div>";

fetch("/get",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

message:msg

})

})

.then(res=>res.json())

.then(data=>{

document.getElementById("chat").innerHTML+=

"<div class='bot'><span>"+data.response+"</span></div>";

document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;

});

document.getElementById("message").value="";

}

</script>

</body>

</html>
